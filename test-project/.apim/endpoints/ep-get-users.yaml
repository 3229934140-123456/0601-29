id: ep-get-users
name: 获取用户列表
description: 获取所有用户列表
method: GET
path: /users
tags:
  - 用户
  - 列表
parameters:
  - name: _limit
    in: query
    required: false
    description: 限制返回数量
    example: 5
headers: {}
assertions:
  - id: assert-1
    name: 状态码200
    type: status
    operator: eq
    value: 200
    enabled: true
  - id: assert-2
    name: 响应时间小于3秒
    type: time
    operator: lt
    value: 3000
    enabled: true
examples:
  - id: ex-1
    name: 默认列表
    description: 获取默认数量的用户
  - id: ex-2
    name: 限制5条
    description: 只获取5个用户
    queryParams:
      _limit: '5'
favorite: true
